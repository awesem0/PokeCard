    <style>
        html, body {
            font-family: 'Arimo', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            justify-content: center;
            align-items: center;
        }
        .left-panel {
            flex: 2;
            min-width: 300px;
            max-width: 518px;
        }
        .right-panel {
            width: 300px;
            margin: 0 auto;
            margin-left: 76px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .card-container {
            position: relative;
            width: 290px;
            height: 462px;
        }
        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: transparent;
            border-radius: 10px;
            overflow: hidden;
        }
        .card-top { z-index: 2; }
        .card-bottom {
            z-index: 1;
            top: calc(76 / 462 * 100%);
            left: calc(76 / 290 * 100%);
            transform: translate(20%, -20%);
        }
        .watermark-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 13;
            pointer-events: none;
        }
        .watermark {
            position: absolute;
            transform: translate(-50%, -50%) rotate(-45deg);
            color: rgba(255, 255, 255, 0.3);
            font-size: 3rem;
            font-weight: bold;
            text-transform: uppercase;
            white-space: nowrap;
        }
        details {
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            width: 518px;
        }
        summary {
            font-family: 'Arimo', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
        }
        .dropdown-group { margin-bottom: 20px; }
        .dropdown-group h3 {
            font-family: 'Arimo', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 10px;
        }
        select, input, textarea {
            width: 100%;
            padding: 8px;
            font-family: 'Arimo', sans-serif;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 10px;
            height: 38px;
            box-sizing: border-box;
        }
        textarea { height: auto; resize: vertical; }
        .emoji-label::before {
            content: '🎨 ';
            font-family: 'Noto Color Emoji', sans-serif;
        }
        #poem-inputs { display: none; }
        .submit-container {
            text-align: center;
            margin-top: 20px;
        }
        .submit-container button {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .custom-select {
            position: relative;
            width: 100%;
            margin-bottom: 10px;
        }
        .custom-select-button {
            width: 100%;
            padding: 8px;
            font-family: 'Arimo', sans-serif;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            background: white;
            text-align: left;
            height: 38px;
            display: flex;
            align-items: center;
        }
        .custom-select-menu {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ccc;
            border-radius: 5px;
            max-height: 500px;
            overflow-y: auto;
            z-index: 1001;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
            padding: 0;
        }
        .custom-option {
            width: 170px;
            height: 135px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            cursor: pointer;
            position: relative;
            pointer-events: auto;
        }
        .custom-option:hover { background: #f0f0f0; }
        .iframe-container {
            width: 170px;
            height: 135px;
            overflow: hidden;
            position: relative;
            border: none;
            outline: none;
        }
        .iframe-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .custom-option-text { padding: 8px; font-size: 1rem; }
        .error {
            color: red;
            display: none;
            text-align: center;
            font-size: 0.8rem;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            background: white;
            padding: 0px;
            border-radius: 10px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .canvas-style { width: 290px; height: 462px; }
        .error-message {
            color: red;
            font-size: 0.9rem;
            margin-top: -5px;
            margin-bottom: 10px;
        }
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 24px; height: 24px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes dropdown {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @media (min-width: 769px) {
            .modal { align-items: flex-start; }
            .modal-content {
                margin-top: 100px;
                animation: dropdown 0.5s ease;
            }
            .header-logo {
                display: block;
                margin: 20px auto;
                width: 400px;
                max-width: 90%;
                height: auto;
            }
            .header-text { display: none; }
        }
        @media (max-width: 768px) {
            html, body { scroll-behavior: smooth; }
            .custom-select-menu { scroll-behavior: smooth; }
            .container {
                flex-direction: column;
                padding-top: 50vh;
                gap: 0;
                padding-bottom: calc(100vh / 7);
            }
            .right-panel {
                width: 100%;
                height: calc(50vh + 7mm);
                margin: 0;
                margin-left: 0;
                position: fixed !important;
                top: 0; left: 0;
                z-index: 10;
                background-color: #f4f4f4;
                padding-top: 10px;
                padding-bottom: 7mm;
            }
            .left-panel {
                max-width: none;
                width: 100%;
                min-width: auto;
                padding-top: calc(10px + 6mm);
            }
            .card-container {
                width: min(90vw, calc((50vh - 20px) * 290 / 462 * 1.106));
                height: auto;
                aspect-ratio: 290 / 462;
                margin: 6mm auto 0 auto;
            }
            .card-bottom {
                top: calc(76 / 462 * 100%);
                left: calc(76 / 290 * 100%);
                transform: translate(20%, -20%);
            }
            .custom-select, select, input, textarea {
                width: calc(100vw - 60px);
                font-size: 1rem;
                margin: 0 auto;
                display: block;
                margin-bottom: 10px;
            }
            details {
                width: calc(100vw - 40px);
                margin: 0 auto;
            }
            summary, .dropdown-group h3 {
                font-size: 1rem;
                font-weight: bold;
            }
            .dropdown-group { margin-bottom: 10px; }
            details {
                margin-bottom: 5px;
                padding: 5px;
            }
            .custom-select-menu {
                position: fixed;
                top: auto; bottom: 0;
                left: 0; right: 0;
                width: 100vw;
                height: 66vh;
                max-height: none;
                overflow-y: auto;
                z-index: 1001;
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 0;
                padding: 2cm 0 1cm 0;
                box-sizing: border-box;
                border-radius: 10px 10px 0 0;
                border-left: none;
                border-right: none;
                border-bottom: none;
                -webkit-overflow-scrolling: touch;
            }
            .custom-option {
                width: 100%;
                height: auto;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 0;
            }
            .iframe-container {
                width: 100%;
                height: auto;
            }
            .iframe-container img {
                width: 100%;
                height: auto;
                object-fit: contain;
            }
            .custom-option-text { font-size: 1rem; }
            h1 { margin-left: 0 !important; }
            .canvas-style { width: 100%; height: 100%; }
            .watermark { font-size: 1.5rem; }
            .hp-container {
                display: flex;
                gap: 10px;
                margin-bottom: 10px;
            }
            .hp-input { flex: 1; width: auto; }
            .submit-container button { height: 38px; }
            .full-height-menu { height: 100vh !important; }
            .poem-title-input { width: calc(100vw - 60px); }
            .poem-line-textarea {
                width: calc(100vw - 60px);
                height: 50px;
            }
            .header-logo { display: none; }
        }
    </style>
</head>

                        const MM_TO_PX = 300 / 25.4;
                        const texts = [
                            { text: text_tag, x_mm: 8.8, y_mm: 56.95, color: 'rgb(0,0,0)', align: 'left' },
                            { text: hp, x_mm: 38.6, y_mm: 57.05, color: 'rgb(0,0,0)', align: 'left' },

                            { text: rightName, x_start: 32.2, x_end: 46.3, y_mm: 61.95, color: 'rgb(0,0,0)', align: 'center' }

                        texts.forEach(({text, x_mm, y_mm, color, x_start, x_end}) => {
                            if (!text) return;
                            ctx.fillStyle = color;
                            const metrics = ctx.measureText(text);
                            let x = x_mm ? x_mm * MM_TO_PX : ((x_start + x_end) / 2) * MM_TO_PX - metrics.width / 2;
                            const y = y_mm * MM_TO_PX + metrics.actualBoundingBoxAscent;
                            ctx.fillText(text, x, y);

                        const num_lines = poem_lines.length;

                }
                if (formData.rightEyewear && formData.rightEyewear !== 'None') {
                    rightEyewearUrl = getThumbnailUrl(getElementKey('RIGHT', 'eyewear', {value: formData.rightEyewear}));
                }
                if (formData.rightAccessories && formData.rightAccessories !== 'None') {
                    rightAccessoryUrl = getThumbnailUrl(getElementKey('RIGHT', 'accessories', {value: formData.rightAccessories}));
                }
                if (formData.rightSidekick && formData.rightSidekick !== 'None') {
                    rightSidekickUrl = getThumbnailUrl(getElementKey('RIGHT', 'sidekick', {value: formData.rightSidekick}));
                }

                const borderColors = [
                    { value: 'Yellow', label: 'Border Yellow' },
                    { value: 'Navy Blue', label: 'Border Navy Blue' },
                    { value: 'Red', label: 'Border Red' },
                    { value: 'White', label: 'Border White' },
                    { value: 'Orange', label: 'Border Orange' },
                    { value: 'Baby Blue', label: 'Border Baby Blue' }
                ];
                const poemOptions = [
                    { value: 'Add Your Own Poem', label: 'Add Your Own Poem' },
                    { value: 'Anniversary', label: 'Anniversary' },
                    { value: 'Birthday', label: 'Birthday' },
                    { value: 'Engagement', label: 'Engagement' },
                    { value: 'I LOVE YOU', label: 'I LOVE YOU' },
                    { value: 'Just Because', label: 'Just Because' },
                    { value: 'Valentines Day', label: 'Valentines Day' },
                    { value: 'Wedding', label: 'Wedding' },
                    { value: 'Get Well Soon', label: 'Get Well Soon' },
                    { value: 'New Home', label: 'New Home' },
                    { value: 'Proposal', label: 'Proposal' },
                    { value: 'First Date', label: 'First Date' },
                    { value: 'Holiday Gift', label: 'Holiday Gift' },
                    { value: "Father's Day", label: "Father's Day" },
                    { value: "Mother's Day", label: "Mother's Day" },
                    { value: 'Congratulations', label: 'Congratulations' },
                    { value: 'Sweet Oath', label: 'Sweet Oath' },
                    { value: 'My Vow', label: 'My Vow' }
                ];
                const genders = [{ value: 'Male', label: 'Male' }, { value: 'Female', label: 'Female' }];
                const ethnicities = [{ value: 'Black', label: 'Black' }, { value: 'White', label: 'White' }];
                const eyeColors = [{ value: 'Blue', label: 'Blue' }, { value: 'Brown', label: 'Brown' }, { value: 'Green', label: 'Green' }];
                const hairColors = [
                    { value: 'Black', label: 'Black' }, { value: 'Blond', label: 'Blond' },
                    { value: 'Blue', label: 'Blue' }, { value: 'Brown', label: 'Brown' },
                    { value: 'Ginger', label: 'Strawberry Blond' }, { value: 'Green', label: 'Green' },
                    { value: 'Grey_White', label: 'White' }, { value: 'Pink', label: 'Pink' },
                    { value: 'Purple', label: 'Purple' }, { value: 'Red', label: 'Red' }
                ];

                const CustomSelect = ({ id, value, options, onChange, placeholder }) => {
                    const [isOpen, setIsOpen] = React.useState(false);
                    const selectedOption = options.find(opt => opt.value === value) || { value: '', label: placeholder };
                    const getDisplayText = (opt, id) => {
                        if (id === 'poemSelection') return 'CHANGE POEM';
                        if (!opt.value) return placeholder;
                        if (id.endsWith('Gender') || id.endsWith('Ethnicity')) return opt.value;
                        if (id.endsWith('EyeColor')) return `Eye Colour ${opt.value}`;
                        if (id.endsWith('HairStyle')) return opt.value === 'No Hair' ? 'No Hair' : `Hair Style ${opt.value.replace('Option ', '')}`;
                        if (id.endsWith('HairColor')) return `Hair Colour ${opt.label}`;
                        if (id.endsWith('FacialHair')) return opt.label;
                        if (id.endsWith('Eyewear')) return opt.label;
                        if (id.endsWith('Accessories')) return opt.label;
                        if (id.endsWith('Apparel')) return `Apparel ${opt.value.replace('Option ', '')}`;
                        if (id.endsWith('Sidekick')) {
                            if (opt.value === 'None') return opt.value;
                            return `Sidekick ${opt.value.replace('Option ', '')}`;
                        }
                        return opt.label || opt.value;
                    };
                    const toggleOpen = () => {
                        if (isOpen) { setIsOpen(false); }
                        else { document.dispatchEvent(new Event('closeAllDropdowns')); setIsOpen(true); }
                    };
                    React.useEffect(() => {
                        const close = () => setIsOpen(false);
                        document.addEventListener('closeAllDropdowns', close);
                        return () => document.removeEventListener('closeAllDropdowns', close);
                    }, []);
                    const handleSelect = (opt) => { onChange(id, opt.value); setIsOpen(false); };
                    React.useEffect(() => {
                        if (window.innerWidth <= 768) {
                            document.body.style.overflow = isOpen ? 'hidden' : '';
                            return () => { document.body.style.overflow = ''; };
                        }
                    }, [isOpen]);
                    React.useEffect(() => {
                        if (isMobile && isOpen && (id.endsWith('Sidekick') || id.endsWith('Apparel') || id.endsWith('HairStyle') || id === 'scene')) {
                            const menu = document.querySelector('.custom-select-menu');
                            if (menu) menu.classList.add('full-height-menu');
                        }
                    }, [isOpen, isMobile, id]);
                    const isLotsOfImages = id === 'scene' || id.endsWith('HairStyle') || id.endsWith('Apparel') || id.endsWith('Sidekick');
                    return (
                        <div className="custom-select">
                            <button type="button" className="custom-select-button" onClick={toggleOpen}>
                                {getDisplayText(selectedOption, id)}
                            </button>
                            {isOpen && (
                                <div className="custom-select-menu">
                                    {options.map(opt => (
                                        <div key={opt.value} className="custom-option" onClick={() => handleSelect(opt)}>
                                            {opt.thumbnail ? (
                                                <div className="iframe-container">
                                                    <img src={opt.thumbnail} alt={opt.value} loading="lazy"
                                                        onError={(e) => { e.target.style.display='none'; }} />
                                                </div>
                                            ) : (
                                                <span className="custom-option-text">{opt.label}</span>
                                            )}
                                        </div>
                                    ))}
                                    {isLotsOfImages && isMobile && Array.from({length: 3}).map((_, i) => (
                                        <div key={`empty-${i}`} className="custom-option"></div>
                                    ))}
                                </div>
                            )}
                        </div>
                    );
                };

                const borderUrl = BORDER_LOCAL_MAP[formData.borderColor] || '';
                const backgroundKey = 'CARDBACKGROUNDOPTIONS/CARDBACKGROUNDOPTION' + formData.backgroundColor.replace('Option ', '') + '.png';
                const backgroundUrl = getThumbnailUrl(backgroundKey);
                const sceneKey = 'SCENE/SCENEOPTION' + formData.scene.replace('Option ', '') + '.png';
                const sceneUrl = getThumbnailUrl(sceneKey);

                const adjustHairStyles = ['Option 13', 'Option 15', 'Option 16', 'Option 18', 'Option 19'];
                const leftHairTop = adjustHairStyles.includes(formData.leftHairStyle) ? 'calc(24.85% + 3px)' : '24.85%';
                const rightHairTop = adjustHairStyles.includes(formData.rightHairStyle) ? 'calc(24.85% + 3px)' : '24.85%';
                const poemLines = formData.poemText.split('\n').slice(0, 4);

                return (
                    <div>
                        <div className="container">
                            <div className="left-panel">
                                <div className="dropdown-group">
                                    <details id="card-design-details">
                                        <summary className="emoji-label">Card Design</summary>
                                        <CustomSelect id="borderColor" value={formData.borderColor} options={borderColors} onChange={handleChange} placeholder="Border Color" />
                                        <CustomSelect id="backgroundColor" value={formData.backgroundColor} options={backgroundOptions} onChange={handleChange} placeholder="Card Colour" />
                                        <CustomSelect id="scene" value={formData.scene} options={sceneOptions} onChange={handleChange} placeholder="Scene" />
                                        {isMobile ? (
                                            <input id="hp" type="text" placeholder="Choose your HP (optional)" value={formData.hp}
                                                onChange={(e) => handleChange('hp', e.target.value)} style={{marginBottom: '10px'}} />
                                        ) : (
                                            <div style={{display: 'flex', gap: '10px', marginBottom: '10px'}}>
                                                <input id="hp" type="text" placeholder="Choose your HP (optional)" value={formData.hp}
                                                    onChange={(e) => handleChange('hp', e.target.value)} style={{flex: '1', height: '38px'}} />
                                                <button type="button"
                                                    onClick={() => setFormData(prev => ({ ...prev, hp: Math.floor(Math.random() * 990 + 10).toString() }))}
                                                    className="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-10 py-2.5 me-2 mb-2 dark:bg-blue-600 dark:hover:bg-blue-700 focus:outline-none dark:focus:ring-blue-800"
                                                    style={{height: '38px'}}>
                                                    Random HP
                                                </button>
                                            </div>
                                        )}
                                        <CustomSelect id="poemSelection" value={formData.poemSelection} options={poemOptions} onChange={handleChange} placeholder="Select a Poem" />
                                        <div id="poem-inputs" style={{marginBottom: '10px'}}>
                                            <input id="poemTitle" type="text" placeholder="Poem Title" maxLength="22"
                                                value={formData.poemTitle}
                                                onChange={(e) => handleChange(e.target.id, e.target.value)}
                                                style={{marginBottom: '10px'}} />
                                            {formData.poemSelection === 'Add Your Own Poem' && (
                                                isMobile ? (
                                                    <>
                                                        {['Line 1', 'Line 2', 'Line 3', 'Line 4'].map((placeholder, index) => (
                                                            <textarea key={index} placeholder={placeholder} maxLength="48" rows="2"
                                                                value={poemLines[index] || ''}
                                                                onChange={(e) => handlePoemLineChange(index, e.target.value)}
                                                                className="poem-line-textarea" style={{marginBottom: '10px'}} />
                                                        ))}
                                                    </>
                                                ) : (
                                                    <textarea id="poemText" placeholder="Poem" rows="4" maxLength="195"
                                                        value={formData.poemText}
                                                        onChange={(e) => handleChange(e.target.id, e.target.value)}
                                                        style={{marginBottom: '10px'}} />
                                                )
                                            )}
                                        </div>
                                    </details>
                                </div>
                                <div className="dropdown-group">
                                    <details id="left-character-details">
                                        <summary className="emoji-label">Left Character</summary>
                                        <input id="leftCharacterColour" type="text" placeholder="Character" value={formData.leftCharacterColour}
                                            onChange={(e) => handleChange(e.target.id, e.target.value)} style={{fontSize: '1rem'}} />
                                        <CustomSelect id="leftGender" value={formData.leftGender} options={genders} onChange={handleChange} placeholder="Gender" />
                                        <CustomSelect id="leftEthnicity" value={formData.leftEthnicity} options={ethnicities} onChange={handleChange} placeholder="Ethnicity" />
                                        <CustomSelect id="leftEyeColor" value={formData.leftEyeColor} options={eyeColors} onChange={handleChange} placeholder="Eye Color" />
                                        <CustomSelect id="leftHairStyle" value={formData.leftHairStyle} options={hairStyleOptions} onChange={handleChange} placeholder="Hair Style" />
                                        <CustomSelect id="leftHairColor" value={formData.leftHairColor} options={hairColors} onChange={handleChange} placeholder="Hair Color" />
                                        <CustomSelect id="leftFacialHair" value={formData.leftFacialHair} options={facialHairOptions} onChange={handleChange} placeholder="Facial Hair" />
                                        <CustomSelect id="leftEyewear" value={formData.leftEyewear} options={eyewearOptions} onChange={handleChange} placeholder="Eyewear" />
                                        <CustomSelect id="leftAccessories" value={formData.leftAccessories} options={accessoryOptions} onChange={handleChange} placeholder="Accessories" />
                                        <CustomSelect id="leftApparel" value={formData.leftApparel} options={apparelOptions} onChange={handleChange} placeholder="Apparel" />
                                        <CustomSelect id="leftSidekick" value={formData.leftSidekick} options={sidekickOptions} onChange={handleChange} placeholder="Sidekick" />
                                    </details>
                                </div>
                                <div className="dropdown-group">
                                    <details id="right-character-details">
                                        <summary className="emoji-label">Right Character</summary>
                                        <input id="rightCharacterColour" type="text" placeholder="Character" value={formData.rightCharacterColour}
                                            onChange={(e) => handleChange(e.target.id, e.target.value)} style={{fontSize: '1rem'}} />
                                        <CustomSelect id="rightGender" value={formData.rightGender} options={genders} onChange={handleChange} placeholder="Gender" />
                                        <CustomSelect id="rightEthnicity" value={formData.rightEthnicity} options={ethnicities} onChange={handleChange} placeholder="Ethnicity" />
                                        <CustomSelect id="rightEyeColor" value={formData.rightEyeColor} options={eyeColors} onChange={handleChange} placeholder="Eye Color" />
                                        <CustomSelect id="rightHairStyle" value={formData.rightHairStyle} options={hairStyleOptions} onChange={handleChange} placeholder="Hair Style" />
                                        <CustomSelect id="rightHairColor" value={formData.rightHairColor} options={hairColors} onChange={handleChange} placeholder="Hair Color" />
                                        <CustomSelect id="rightFacialHair" value={formData.rightFacialHair} options={facialHairOptions} onChange={handleChange} placeholder="Facial Hair" />
                                        <CustomSelect id="rightEyewear" value={formData.rightEyewear} options={eyewearOptions} onChange={handleChange} placeholder="Eyewear" />
                                        <CustomSelect id="rightAccessories" value={formData.rightAccessories} options={accessoryOptions} onChange={handleChange} placeholder="Accessories" />
                                        <CustomSelect id="rightApparel" value={formData.rightApparel} options={apparelOptions} onChange={handleChange} placeholder="Apparel" />
                                        <CustomSelect id="rightSidekick" value={formData.rightSidekick} options={sidekickOptions} onChange={handleChange} placeholder="Sidekick" />
                                    </details>
                                </div>
                                <div className="submit-container">
                                    <button onClick={handleSubmit} disabled={isSubmitting}
                                        className={`bg-blue-900 text-white px-16 py-4 text-lg rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 w-full text-center ${isSubmitting ? 'opacity-50 cursor-not-allowed' : 'hover:bg-blue-800'}`}>
                                        {isSubmitting ? <div className="loading-spinner"></div> : 'SUBMIT'}
                                    </button>
                                </div>
                                {showModal && (
                                    <div className="modal">
                                        <div className="modal-content">
                                            <h2 className="text-2xl font-bold mb-4">Pokémon Card Power-Up!</h2>
                                            <p className="mb-4">Thanks for crafting your Poké-powered card! I'll match it to your order using the couple's names :)</p>
                                            <button onClick={() => setShowModal(false)}
                                                className="bg-blue-900 text-white px-8 py-2 rounded-md hover:bg-blue-800">
                                                OK
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                            <div className="right-panel">
                                <div className="card-container">
                                    <div className="card card-top">
                                        <div style={{position: 'relative', width: '100%', height: '100%'}}>
                                            {borderUrl && <img src={borderUrl} alt="Border" style={{position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', zIndex: 1}} />}
                                            {backgroundUrl && <img src={backgroundUrl} alt="Background" style={{position: 'absolute', left: '5.55%', top: '3.49%', width: '88.89%', height: '93.02%', zIndex: 2}} />}
                                            {sceneUrl && <img src={sceneUrl} alt="Scene" style={{position: 'absolute', left: '50%', top: '9.53%', transform: 'translateX(-50%)', width: '81.5%', height: 'auto', zIndex: 3}} />}
                                            {leftFaceUrl && <img src={leftFaceUrl} alt="Left Face" style={{position: 'absolute', left: '7.79%', top: '24.85%', width: '47.78%', height: 'auto', zIndex: 5}} />}
                                            {rightFaceUrl && <img src={rightFaceUrl} alt="Right Face" style={{position: 'absolute', left: '43.79%', top: '24.85%', width: '47.78%', height: 'auto', zIndex: 5}} />}
                                            {leftFacialUrl && <img src={leftFacialUrl} alt="Left Facial Hair" style={{position: 'absolute', left: '7.79%', top: '24.85%', width: '47.78%', height: 'auto', zIndex: 15}} />}
                                            {rightFacialUrl && <img src={rightFacialUrl} alt="Right Facial Hair" style={{position: 'absolute', left: '43.79%', top: '24.85%', width: '47.78%', height: 'auto', zIndex: 15}} />}
                                            {leftHairUrl && <img src={leftHairUrl} alt="Left Hair" style={{position: 'absolute', left: '7.79%', top: leftHairTop, width: '47.78%', height: 'auto', zIndex: 7}} />}
                                            {rightHairUrl && <img src={rightHairUrl} alt="Right Hair" style={{position: 'absolute', left: '43.79%', top: rightHairTop, width: '47.78%', height: 'auto', zIndex: 7}} />}
                                            {leftEyewearUrl && <img src={leftEyewearUrl} alt="Left Eyewear" style={{position: 'absolute', left: '7.79%', top: '24.85%', width: '47.78%', height: 'auto', zIndex: 8}} />}
                                            {rightEyewearUrl && <img src={rightEyewearUrl} alt="Right Eyewear" style={{position: 'absolute', left: '43.79%', top: '24.85%', width: '47.78%', height: 'auto', zIndex: 8}} />}
                                            {leftAccessoryUrl && <img src={leftAccessoryUrl} alt="Left Accessory" style={{position: 'absolute', left: '7.79%', top: '24.85%', width: '47.78%', height: 'auto', zIndex: 9}} />}
                                            {rightAccessoryUrl && <img src={rightAccessoryUrl} alt="Right Accessory" style={{position: 'absolute', left: '43.79%', top: '24.85%', width: '47.78%', height: 'auto', zIndex: 9}} />}
                                            {leftApparelUrl && <img src={leftApparelUrl} alt="Left Apparel" style={{position: 'absolute', left: '7.79%', top: '24.63%', width: '47.78%', height: 'auto', zIndex: 10}} />}
                                            {rightApparelUrl && <img src={rightApparelUrl} alt="Right Apparel" style={{position: 'absolute', left: '43.79%', top: '24.63%', width: '47.78%', height: 'auto', zIndex: 10}} />}
                                            <img src={FOURTH_LAYER_URL} alt="Frame" style={{position: 'absolute', left: '50%', top: '3.14%', transform: 'translateX(-50%)', width: '84%', height: 'auto', zIndex: 11}} />
                                            {leftSidekickUrl && <img src={leftSidekickUrl} alt="Left Sidekick" style={{position: 'absolute', left: '11.45%', top: '50.44%', width: '20.6%', height: 'auto', zIndex: 12}} />}
                                            {rightSidekickUrl && <img src={rightSidekickUrl} alt="Right Sidekick" style={{position: 'absolute', left: '68.55%', top: '50.44%', width: '20.6%', height: 'auto', zIndex: 12}} />}
                                            <img src={SPEECH_BUBBLE_URL} alt="Speech Bubble" style={{position: 'absolute', left: '45.45%', top: '33.33%', width: '9.09%', height: 'auto', zIndex: 13}} />
                                            <canvas ref={canvasRef} className="canvas-style" style={{position: 'absolute', top: 0, left: 0, zIndex: 14}}></canvas>
                                        </div>
                                        <div className="watermark-container">
                                            {Array.from({length: 9}).map((_, i) => (
                                                <div key={i} className="watermark" style={{top: `${Math.floor(i / 3) * 33}%`, left: `${(i % 3) * 33}%`}}>
                                                    Preview Only
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="card card-bottom">
                                        <img src={BACK_CARD_URL} alt="Bottom Card" style={{width: '100%', height: '100%'}} />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
